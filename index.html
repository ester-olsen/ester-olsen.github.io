<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Carmilla fanfic timeline</title>
        <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
        <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.0.min.js"></script>
    </head>
    <body>
        <header class="header">
            <h1 class="heading">Carmilla fanfic timeline</h1>
            <p class="byline">By Ester Olsen</p>
            <p class="updated">Updated 2019-04-17</p>
        </header>
        <main class="main">
            <div>
                <input class="url-input" type="text" placeholder="AO3 link" />
            </div>
            <div class="date-inputs">
                <input class="date-input date-input--published" type="text" placeholder="Published" />
                <input class="date-input date-input--updated" type="text" placeholder="Updated" />
            </div>
            <div class="era era--published">
                <h3 class="era__heading">Published</h3>
                <p class="era__era"></p>
            </div>
            <div class="era era--updated">
                <h3 class="era__heading">Updated</h3>
                <p class="era__era"></p>
            </div>
        </main>
        <script src="main.js"></script>
    </body>
</html>
